# Netlify — Oxygen Island (site statique, aucune étape de build)
[build]
  publish = "."
  command = ""

# Vidéos : cache long, contenu immuable (accélère le chargement, économise la bande passante)
[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pages HTML : toujours revalider pour propager les mises à jour immédiatement
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# En-têtes de sécurité de base
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
